<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Under Construction | Edith Venter Promotions</title>
  
  <link href="assets/assets/img/Favicon/EV_LOGO.ico" rel="icon" type="image/x-icon">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

  <style>
    :root {
      --primary-gradient: linear-gradient(45deg, #a24cc7, #e64e9f, #e25129, #ec740b);
      --stage-dark: #0f0213; /* Deep midnight purple */
      --body-font: "Montserrat", sans-serif;
    }

    /* Background Canvas */
    #bokeh-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      opacity: 0.7; 
    }

    body {
      font-family: var(--body-font);
      background-color: var(--stage-dark); /* Applied from undercon.css */
      color: #ffffff; /* Requested white body color */
      margin: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .construction-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 2;
      padding: 60px 0;
    }

    .body-logo {
      width: 100%;
      max-width: 350px;
      margin-bottom: 2rem;
      filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.1));
    }

    .text-gradient {
      background: var(--primary-gradient) !important;
      -webkit-background-clip: text !important;
      -webkit-text-fill-color: transparent !important;
      background-clip: text !important;
    }

    .construction-icon i {
      font-size: 5rem;
      animation: rotateGear 4s linear infinite;
      display: inline-block;
    }

    @keyframes rotateGear {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .gt-btn {
      display: inline-block;
      padding: 14px 50px;
      border-radius: 50px;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.3s ease;
      border: 2px solid #a24cc7;
      background: #ffffff;
      color: #a24cc7;
    }

    .gt-btn:hover {
      transform: translateY(-3px);
      background: var(--primary-gradient);
      color: #fff !important;
      border-color: transparent;
      box-shadow: 0 0 20px rgba(230, 78, 159, 0.4);
    }

    .lead {
      color: rgba(255, 255, 255, 0.85); /* Slightly dimmed white for better reading flow */
    }

    #footer {
      padding: 40px 0;
      position: relative;
      z-index: 2;
      background: transparent !important; /* Source instruction for undercon */
    }

    .social-links a {
      transition: transform 0.3s ease;
    }

    .social-links a:hover {
      transform: scale(1.1);
    }
  </style>
</head>

<body>
  <canvas id="bokeh-canvas"></canvas>

  <main class="construction-wrapper">
    <div class="container text-center">
      <div class="row justify-content-center mb-4">
        <div class="col-md-8 col-lg-6" data-aos="fade-down">
          <img src="./assets/assets/img/Logo/EV_logo.svg" alt="Edith Venter Promotions" class="body-logo img-fluid">
        </div>
      </div>

      <div class="row justify-content-center">
        <div class="col-lg-10">
          <div class="construction-icon mb-4" data-aos="zoom-in">
            <i class="bi bi-gear-fill text-gradient"></i>
          </div>
          <h1 class="display-3 fw-bold mb-3 text-gradient" data-aos="fade-up">Site Under Construction</h1>
          <p class="lead mb-5 mx-auto" style="max-width: 700px;" data-aos="fade-up" data-aos-delay="200">
            We are currently refining our digital presence to better serve your premier event management needs. We will be back online shortly.
          </p>
          <div class="cta-wrapper" data-aos="fade-up" data-aos-delay="400">
            <a href="mailto:edith@edithventerpromo.com" class="gt-btn">Inquire Via Email</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer id="footer">
    <div class="container text-center">
      <div class="social-links d-flex justify-content-center gap-4 mb-3">
        <a href="https://www.linkedin.com/company/edithventerpromo/" class="text-gradient fs-1"><i class="fab fa-linkedin"></i></a>
        <a href="https://www.instagram.com/edith_venter_promotions/" class="text-gradient fs-1"><i class="fab fa-instagram"></i></a>
        <a href="https://www.facebook.com/Edithventerpromotions" class="text-gradient fs-1"><i class="fab fa-facebook"></i></a>
      </div>
      <p class="small opacity-75">© 2026 Edith Venter Promotions. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

  <script>
    // Initialize AOS
    AOS.init({ duration: 1000, once: true });

    // Bokeh Particle Background with Gradient Colors
    const canvas = document.getElementById('bokeh-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    
    // Brand Colors for Particles
    const brandColors = ['#a24cc7', '#e64e9f', '#e25129', '#ec740b'];

    function initCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    class Particle {
      constructor() {
        this.reset();
      }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 12 + 4;
        this.speedX = Math.random() * 0.4 - 0.2;
        this.speedY = Math.random() * 0.4 - 0.2;
        // Randomly pick a color from the text gradient palette
        this.color = brandColors[Math.floor(Math.random() * brandColors.length)];
        this.opacity = Math.random() * 0.4 + 0.1;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x > canvas.width || this.x < 0 || this.y > canvas.height || this.y < 0) {
          this.reset();
        }
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.globalAlpha = this.opacity;
        ctx.fill();
        ctx.globalAlpha = 1.0;
      }
    }

    function createParticles() {
      particles = [];
      const count = (canvas.width * canvas.height) / 18000;
      for (let i = 0; i < count; i++) {
        particles.push(new Particle());
      }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.update();
        p.draw();
      });
      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', () => {
      initCanvas();
      createParticles();
    });

    initCanvas();
    createParticles();
    animate();
  </script>
</body>
</html>
