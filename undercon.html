<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon | Edith Venter Promotions</title>
  
  <link href="assets/assets/img/Favicon/EV_LOGO.ico" rel="icon" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="./assets/assets/css/undercon.css">
</head>

<body>
  <header class="header">
    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand" href="#">
          <img src="./assets/assets/img/Logo/EV_logo.svg" alt="Edith Venter Promotions Logo">
        </a>
      </div>
    </nav>
  </header>

  <main>
    <section id="hero" class="hero-section d-flex align-items-center">
      <div class="container">
        <div class="row align-items-center">
          <div class="col-lg-6 hero-content" data-aos="fade-right">
            <h1 class="display-3 fw-bold mb-4">Something <span class="text-gradient">Exceptional</span> is Coming</h1>
            <p class="lead mb-5">We are currently curating a new digital experience. 21 years of luxury event excellence is getting a fresh new look.</p>
            
            <div class="d-flex gap-3 flex-wrap align-items-center">
                <a href="mailto:edith@edithventerpromo.com" class="gt-btn">Inquire Now</a>
                <div class="timer-display d-flex gap-3">
                    <div class="text-center"><span id="days" class="d-block fw-bold fs-3 text-gradient">00</span><small>Days</small></div>
                    <div class="text-center"><span id="hours" class="d-block fw-bold fs-3 text-gradient">00</span><small>Hrs</small></div>
                    <div class="text-center"><span id="mins" class="d-block fw-bold fs-3 text-gradient">00</span><small>Mins</small></div>
                </div>
            </div>
          </div>

          <div class="col-lg-6 text-center hero-visual" data-aos="zoom-in">
            <div class="glass-panel p-2">
              <img src="assets/assets/img/Hero/New_Hero_img.jpg" class="img-fluid rounded-4" alt="Coming Soon Visual">
              <div class="mt-3 py-2">
                <p class="text-white small mb-0 opacity-75"><em>"Crafting Luxury Experiences Since 2005"</em></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer id="footer" class="py-5">
    <div class="container text-center">
      <img src="./assets/assets/img/Logo/ev_logo.png" style="height: 70px;" class="mb-4" alt="Footer Logo">
      <div class="social-links d-flex justify-content-center gap-4 mb-4">
        <a href="https://www.linkedin.com/company/edithventerpromo/" class="text-gradient fs-3"><i class="fab fa-linkedin"></i></a>
        <a href="https://www.instagram.com/edith_venter_promotions/" class="text-gradient fs-3"><i class="fab fa-instagram"></i></a>
        <a href="https://www.facebook.com/Edithventerpromotions" class="text-gradient fs-3"><i class="fab fa-facebook"></i></a>
      </div>
      <p class="small opacity-50 mb-0">© 2026 Edith Venter Promotions. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./assets/assets/js/main.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

</html>
